<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AI 화성 정밀 탐사 VR 시스템</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    <style>
        /* [1] 다이나믹 우주 항해 인트로 스크린 */
        #intro-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #030308; z-index: 100000; display: flex;
            align-items: center; justify-content: center; overflow: hidden;
            transition: opacity 1.2s ease-in-out;
        }
        .space-bg {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at 10% 50%, #1a102f 0%, #030308 100%);
        }
        .stars {
            position: absolute; width: 2px; height: 2px; background: white;
            box-shadow: 15vw 10vh #fff, 25vw 70vh rgba(255,255,255,0.4), 45vw 25vh #fff, 65vw 80vh rgba(255,255,255,0.7), 85vw 20vh #fff, 92vw 65vh #fff, 5vw 85vh rgba(255,255,255,0.6), 75vw 15vh rgba(255,255,255,0.3);
        }
        
        /* 천체 기본 스타일 */
        .celestial { position: absolute; border-radius: 50%; transform: translate(-50%, -50%); }
        .sun { width: 180px; height: 180px; left: 5%; top: 50%; background: radial-gradient(circle at center, #ffffff 0%, #ffbb00 30%, #ff4400 70%, transparent 100%); box-shadow: 0 0 60px rgba(255, 68, 0, 0.6); }
        .mercury { width: 10px; height: 10px; left: 20%; top: 46%; background: radial-gradient(circle at 30% 30%, #95a5a6, #34495e); }
        .venus { width: 22px; height: 22px; left: 32%; top: 56%; background: radial-gradient(circle at 30% 30%, #e3bb7b, #a17438); box-shadow: 0 0 15px rgba(227, 187, 123, 0.4); }
        .earth { width: 38px; height: 38px; left: 48%; top: 38%; background: radial-gradient(circle at 30% 30%, #2b72cf, #0b2b5c); box-shadow: 0 0 20px rgba(43, 114, 207, 0.6); z-index: 10; }
        .moon-system { position: absolute; width: 64px; height: 64px; left: 48%; top: 38%; transform: translate(-50%, -50%); animation: moonOrbit 4s linear infinite; z-index: 11; }
        .moon { position: absolute; width: 7px; height: 7px; background: #eceff1; border-radius: 50%; top: 0; left: 50%; transform: translateX(-50%); box-shadow: 0 0 6px #fff; }
        @keyframes moonOrbit { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } }
        .mars-target { width: 34px; height: 34px; left: 82%; top: 62%; background: radial-gradient(circle at 30% 30%, #f05e23, #b83b14, #4a1202); box-shadow: 0 0 25px rgba(240, 94, 35, 0.7); z-index: 10; }
        .orbit-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }

        /* 인트로 항해 로켓 무브먼트 */
        .rocket {
            position: absolute; font-size: 34px; left: 48%; top: 38%; transform: translate(-50%, -50%) rotate(60deg); z-index: 100;
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.6)); animation: cinematicHohmannLaunch 7s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes cinematicHohmannLaunch {
            0% { left: 48%; top: 38%; transform: translate(-50%, -50%) rotate(60deg) scale(1); opacity: 1; }
            25% { left: 56%; top: 26%; transform: translate(-50%, -50%) rotate(85deg) scale(1); opacity: 1; }
            50% { left: 66%; top: 24%; transform: translate(-50%, -50%) rotate(110deg) scale(1); opacity: 1; }
            72% { left: 75%; top: 36%; transform: translate(-50%, -50%) rotate(135deg) scale(1); opacity: 1; }
            85% { left: 80%; top: 48%; transform: translate(-50%, -50%) rotate(315deg) scale(0.95); opacity: 1; }
            92% { left: 82%; top: 62%; transform: translate(-50%, -50%) rotate(315deg) scale(0.85); opacity: 1; }
            97% { left: 82%; top: 62%; transform: translate(-50%, -50%) rotate(315deg) scale(0.85); opacity: 1; }
            100% { left: 82%; top: 62%; transform: translate(-50%, -50%) rotate(315deg) scale(0.85) opacity: 0; }
        }

        .intro-title { position: absolute; top: 15%; color: #fff; font-family: 'Malgun Gothic', sans-serif; font-size: 26px; font-weight: bold; letter-spacing: 4px; text-shadow: 0 0 20px rgba(240, 94, 35, 0.7); text-align: center; width: 100%; animation: pulseText 2s infinite alternate; }
        @keyframes pulseText { 0% { opacity: 0.7; text-shadow: 0 0 10px rgba(240, 94, 35, 0.4); } 100% { opacity: 1; text-shadow: 0 0 25px rgba(240, 94, 35, 0.9); } }
        .skip-btn { position: absolute; bottom: 30px; right: 30px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.25); color: white; padding: 11px 24px; border-radius: 25px; cursor: pointer; font-family: sans-serif; z-index: 100001; transition: 0.3s; }
        .skip-btn:hover { background: rgba(230, 126, 34, 0.3); border-color: #e67e22; }

        /* [2] 사진 선택 대기화면 상시 화성 착륙&엔진 가동 라이브 애니메이션 배경 */
        #dashboard-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, #140300 0%, #301205 35%, #080314 100%);
            z-index: 1; overflow: hidden; display: block;
        }
        .dash-stars {
            position: absolute; width: 100%; height: 100%; background-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px); background-size: 200px 200px; opacity: 0.3;
        }
        .mars-horizon {
            position: absolute; bottom: 0; width: 100%; height: 22%;
            background: linear-gradient(to top, #0f0200 0%, #2b0b03 100%);
            border-top: 3px solid #6e220f; box-shadow: 0 -10px 30px rgba(240, 94, 35, 0.15);
        }
        
        .landed-rocket-base {
            position: absolute; right: 50%; bottom: 25%; 
            display: flex; flex-direction: column; align-items: center; z-index: 1; 
        }
        .landed-rocket-body {
            font-size: 200px; filter: drop-shadow(0 0 20px rgba(255,140,0,0.4)); /* 기본 폰트사이즈 95px */
            transform: rotate(-45deg); 
            animation: rocketVibration 0.05s infinite alternate;
            position: relative;
            z-index: 3; /* 로켓을 불꽃보다 항상 위로 조절 */
        }
        /* 메인 엔진 시동 진동 */
        @keyframes rocketVibration {
            0% { transform: rotate(-45deg) translate(0, 0); }
            100% { transform: rotate(-45deg) translate(0.8px, 1.2px); }
        }
        
        /* [수정] 불꽃 컨테이너와 입자를 로켓 몸통 아래로 대폭 하향 조정 */
        .thruster-fire-container {
            position: absolute; 
            bottom: -120px; /* 기존 -35px에서 -80px로 내려서 로켓 하단에 완전히 맞춤 */
            left: 55%; transform: translateX(-50%);
            width: 150px; height: 250px; pointer-events: none;
            z-index: 2;
        }
        .flame-particle {
            position: absolute; 
            bottom: 20px; /* 기존 85px에서 20px로 시작점을 낮춰 이모지 겹침 현상 해결 */
            left: 50%; transform: translateX(-50%);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            background: linear-gradient(to bottom, #ffffff 0%, #00d2ff 20%, #ffaa00 50%, #ff3300 80%, transparent 100%);
            animation: flameBurnLoop 0.4s infinite linear; opacity: 0;
            mix-blend-mode: screen; filter: blur(2px);
        }
        .f-p1 { width: 45px; height: 140px; animation-delay: 0s; }
        .f-p2 { width: 65px; height: 190px; animation-delay: 0.12s; margin-left: -3px; }
        .f-p3 { width: 40px; height: 120px; animation-delay: 0.24s; margin-left: 3px; }
        
        @keyframes flameBurnLoop {
            0% { transform: translateX(-50%) translateY(0) scaleX(1) scaleY(1); opacity: 1; filter: blur(1px); }
            50% { transform: translateX(-50%) translateY(70px) scaleX(0.8) scaleY(0.9); opacity: 0.9; }
            100% { transform: translateX(-50%) translateY(160px) scaleX(0.2) scaleY(0.5); opacity: 0; filter: blur(6px); }
        }
        /* 화성 레골리스 연기 파티클 시스템 */
        .smoke-particle {
            position: absolute; bottom: 100px; border-radius: 50%;
            background: rgba(221, 221, 217, 0.8); filter: blur(5px);
            animation: smokeDriftLoop 1.2s infinite ease-out; opacity: 0;
        }
        .s-p1 { width: 50px; height: 50px; left: -25px; animation-delay: 0s; --driftX: -50px; }
        .s-p2 { width: 70px; height: 70px; left: 15px; animation-delay: 0.3s; --driftX: 60px; }
        .s-p3 { width: 55px; height: 55px; left: -5px; animation-delay: 0.6s; --driftX: -20px; }
        
        @keyframes smokeDriftLoop {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            20% { opacity: 0.7; }
            60% { opacity: 0.4; }
            100% { transform: translate(var(--driftX), 50px) scale(2.5); opacity: 0; filter: blur(22px); }
        }

        /* [3] 메인 대시보드 UI 레이아웃 및 뷰 스타일 */
        #ui-layer {
            position: absolute; top: 20px; left: 20px; z-index: 9999;
            background: rgba(25, 15, 10, 0.92); color: white; padding: 25px;
            border-radius: 16px; font-family: 'Malgun Gothic', sans-serif; border: 2px solid #e67e22;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7); max-width: 320px;
        }
        
        #nav-system {
            position: absolute; top: 20px; right: 20px; z-index: 9999;
            background: rgba(35, 22, 11, 0.95); padding: 16px; border-radius: 20px;
            border: 2px solid #e67e22; color: white; text-align: center; display: none;
            font-family: 'Malgun Gothic', sans-serif; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        
        #minimap-container {
            width: 160px; height: 160px; position: relative; margin: 0 auto 10px;
            border-radius: 50%; border: 3px double #e67e22; background: #1a0f05;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8); overflow: hidden;
        }
        #minimap-rotator { width: 100%; height: 100%; position: absolute; top: 0; left: 0; border-radius: 50%; transition: transform 0.1s linear; z-index: 1; }
        #marker-layer { width: 100%; height: 100%; position: absolute; top: 0; left: 0; border-radius: 50%; z-index: 2; pointer-events: none; }

        .compass-axis { position: absolute; background: rgba(230, 126, 34, 0.2); }
        .axis-v { width: 1px; height: 100%; left: 50%; top: 0; }
        .axis-h { height: 1px; width: 100%; top: 50%; left: 0; }

        .direction-label { position: absolute; color: #ffffff; font-weight: bold; font-size: 14px; text-shadow: 0 0 4px #000; transform: translate(-50%, -50%); }
        .dir-n { top: 12px; left: 50%; }
        .dir-s { bottom: 2px; left: 50%; }
        .dir-w { left: 12px; top: 50%; }
        .dir-e { right: 2px; top: 50%; }
        
        .map-marker { position: absolute; transform: translate(-50%, -50%); border-radius: 50%; }
        #player-dot { width: 12px; height: 12px; background: #00ff00; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 10px #00ff00; z-index: 10; }
        .station-dot { width: 7px; height: 7px; background: #e74c3c; box-shadow: 0 0 6px #e74c3c; }
        .station-label { font-size: 8px; color: #ff8d8d; position: absolute; top: -12px; left: 5px; white-space: nowrap; font-weight: bold; }
        #curiosity-dot { width: 7px; height: 7px; background: #f1c40f; box-shadow: 0 0 5px #f1c40f; }
        #perseverance-dot { width: 7px; height: 7px; background: #00ffff; box-shadow: 0 0 5px #00ffff; }
        #rocket-dot { width: 9px; height: 9px; background: #ff0000; box-shadow: 0 0 8px #ff0000; z-index: 5; }
        
        #vr-controls { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 9999; display: none; gap: 10px; }
        button { padding: 11px 18px; cursor: pointer; background: #d35400; border: none; color: white; border-radius: 20px; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #e67e22; }
        .fs-btn { background: #2980b9; }
        .fs-btn:hover { background: #3498db; }
        .file-label { display: block; padding: 12px; background: #2c3e50; text-align: center; border-radius: 8px; margin: 12px 0; cursor: pointer; font-size: 0.9em; border: 1px dashed #3498db; }
        .file-label:hover { background: #34495e; }

        #keypad-container { display: none; position: absolute; bottom: 30px; left: 30px; z-index: 9999; grid-template-columns: repeat(3, 200px); grid-template-rows: repeat(3, 200px); gap: 6px; }
        .keypad-btn { width: 200px; height: 200px; padding: 0; background: rgba(193, 227, 59, 0.75); color: white; border: none; border-radius: 50%; font-size: 100px; font-weight: bold; cursor: pointer; user-select: none; }
        .keypad-btn:active { background: #13496b; }
    </style>
</head>
<body>

    <div id="intro-screen">
        <div class="space-bg"></div>
        <div class="stars"></div>
        <div class="intro-title">화성에서 생존하기 위한 기지 설계</div>
        
        <div class="celestial sun" title="태양"></div>
        <div class="celestial mercury" title="수성"></div>
        <div class="celestial venus" title="금성"></div>
        <div class="celestial earth" title="지구"></div>
        <div class="moon-system"><div class="moon" title="달"></div></div>
        <div class="celestial mars-target" title="화성"></div>
        
        <svg class="orbit-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
            <path d="M 48 38 Q 65 18, 82 62" fill="none" stroke="rgba(240, 94, 35, 0.25)" stroke-dasharray="1.5" stroke-width="0.3"/>
        </svg>

        <div class="rocket">🚀</div>
        <button class="skip-btn" onclick="endIntro()">건너뛰기 ➔</button>
    </div>

    <div id="dashboard-bg">
        <div class="dash-stars"></div>
        <div class="mars-horizon"></div>
        <div class="landed-rocket-base">
            <div class="landed-rocket-body">🚀</div>
            <div class="thruster-fire-container">
                <div class="flame-particle f-p1"></div>
                <div class="flame-particle f-p2"></div>
                <div class="flame-particle f-p3"></div>
                <div class="smoke-particle s-p1"></div>
                <div class="smoke-particle s-p2"></div>
                <div class="smoke-particle s-p3"></div>
            </div>
        </div>
    </div>

    <div id="ui-layer">
        <h2 style="margin:0; font-size: 1.4em; color: #e67e22;">🔴 VR 화성 탐사 </h2>
        <p style="font-size:0.85em; color:#ccc; line-height: 1.5; margin-top: 8px;">각 모둠에서 설계한 화성 기지 그림을 등록하여 <br>화성을 탐사해 보세요 (다중 선택 가능).</p>
        
        <label class="file-label" for="imageInput">📂 화성 기지 사진 선택 (최대 8장)</label>
        <input type="file" id="imageInput" accept="image/*" multiple style="display:none;" onchange="handleFileCount(this)">
        <div id="file-count" style="font-size:0.85em; color:#ffcc00; font-weight: bold; margin-bottom:15px; text-align: center;">선택된 파일 없음</div>
        
        <button onclick="startMission()" style="width: 100%; height: 45px; font-size: 1.05em;">화성 탐사 시작 🚀</button>
    </div>

    <div id="nav-system">
        <div id="minimap-container">
            <div id="minimap-rotator">
                <div class="compass-axis axis-v"></div>
                <div class="compass-axis axis-h"></div>
                <div class="direction-label dir-n">N</div>
                <div class="direction-label dir-s">S</div>
                <div class="direction-label dir-w">W</div>
                <div class="direction-label dir-e">E</div>
            </div>
            <div id="marker-layer">
                <div id="curiosity-dot" class="map-marker" title="Curiosity"></div>
                <div id="perseverance-dot" class="map-marker" title="Perseverance"></div>
                <div id="rocket-dot" class="map-marker"></div>
                <div id="station-markers-layer"></div>
            </div>
            <div id="player-dot"></div>
        </div>
        <div id="compass" style="color:#ffcc00; font-weight:bold; font-size: 1.1em; margin-bottom: 2px;">N 0°</div>
        <div id="coord-display" style="color:#ffffff; font-size: 0.95em; font-family: monospace; letter-spacing: 1px;">X:0 Z:5</div>
    </div>

    <div id="vr-controls">
        <button onclick="setEnv('day')">☀️ 낮</button>
        <button onclick="setEnv('night')">🌙 밤</button>
        <button onclick="setEnv('storm')">🌪️ 모래폭풍</button>
        <button id="keypadToggleBtn" onclick="toggleKeypad()">🎮 키패드 켜기</button>
        <button id="fullscreenBtn" class="fs-btn" onclick="toggleFullscreen()">🖥️ 전체화면</button>
    </div>

    <div id="keypad-container">
        <div></div>
        <button class="keypad-btn" onpointerdown="keypadState.up=true" onpointerup="keypadState.up=false" onpointerleave="keypadState.up=false">▲</button>
        <div></div>
        <button class="keypad-btn" onpointerdown="keypadState.left=true" onpointerup="keypadState.left=false" onpointerleave="keypadState.left=false">◀</button>
        <div></div>
        <button class="keypad-btn" onpointerdown="keypadState.right=true" onpointerup="keypadState.right=false" onpointerleave="keypadState.right=false">▶</button>
        <div></div>
        <button class="keypad-btn" onpointerdown="keypadState.down=true" onpointerup="keypadState.down=false" onpointerleave="keypadState.down=false">▼</button>
        <div></div>
    </div>

     <a-scene id="scene" style="display: none;" fog="type: exponential; color: #db8d5c; density: 0.015;" vr-mode-ui="enabled: false;">
        <a-sky id="sky" color="#e67e22"></a-sky>
        <a-plane rotation="-90 0 0" width="1000" height="1000" color="#7a3a1e"></a-plane>

        <a-entity position="0 0 -120">
            <a-cone color="#5d2a1a" radius-bottom="60" height="35" position="-60 17 0"></a-cone>
            <a-cone color="#6d351a" radius-bottom="80" height="25" position="0 12 -20"></a-cone>
            <a-cone color="#4d2515" radius-bottom="45" height="45" position="70 22 10"></a-cone>
        </a-entity>
        <a-sphere position="-25 -4 -40" radius="18" color="#8b4513" scale="2 0.4 2"></a-sphere>
        <a-sphere position="35 -5 -20" radius="22" color="#9b5523" scale="1.5 0.4 1.5"></a-sphere>

        <a-entity id="dynamic-stations"></a-entity>

        <a-entity id="curiosity" position="-15 1.2 -10" rotation="0 45 0" scale="0.9 0.9 0.9">
            <a-box width="1.6" height="0.8" depth="2.4" color="#999" material="roughness: 0.6"></a-box>
            <a-box width="1.5" height="0.1" depth="2.3" position="0 0.45 0" color="#222"></a-box>
            <a-cylinder radius="0.04" height="1.4" position="0.3 0.7 0.8" color="#666"></a-cylinder>
            <a-box width="0.4" height="0.3" depth="0.3" position="0.3 1.4 0.8" color="#333"></a-box>
            <a-sphere radius="0.06" position="0.3 1.4 0.95" color="#111"></a-sphere>
            <a-cylinder radius="0.25" height="0.7" rotation="90 0 0" position="0 0.2 -1.3" color="#444"></a-cylinder>
            <a-cylinder radius="0.03" height="0.8" position="-0.4 0.1 1.2" rotation="45 30 0" color="#555"></a-cylinder>
            <a-box width="2.2" height="0.1" depth="0.1" position="0 -0.4 0" color="#444"></a-box>
            <a-cylinder radius="0.4" height="0.3" rotation="0 0 90" position="-1.0 -0.8 0.8" color="#222"></a-cylinder>
            <a-cylinder radius="0.4" height="0.3" rotation="0 0 90" position="-1.0 -0.8 0" color="#222"></a-cylinder>
            <a-cylinder radius="0.4" height="0.3" rotation="0 0 90" position="-1.0 -0.8 -0.8" color="#222"></a-cylinder>
            <a-cylinder radius="0.4" height="0.3" rotation="0 0 90" position="1.0 -0.8 0.8" color="#222"></a-cylinder>
            <a-cylinder radius="0.4" height="0.3" rotation="0 0 90" position="1.0 -0.8 0" color="#222"></a-cylinder>
            <a-cylinder radius="0.4" height="0.3" rotation="0 0 90" position="1.0 -0.8 -0.8" color="#222"></a-cylinder>
            <a-text value="CURIOSITY" position="0 2.2 0" align="center" color="#ffcc00" width="6" look-at="#mainCamera"></a-text>
        </a-entity>

        <a-entity id="perseverance" position="25 1.2 5" rotation="0 -30 0" scale="0.9 0.9 0.9">
            <a-box width="1.6" height="0.9" depth="2.5" color="#eee" material="roughness: 0.4"></a-box>
            <a-box width="1.5" height="0.1" depth="2.4" position="0 0.5 0" color="#111"></a-box>
            <a-cylinder radius="0.05" height="1.5" position="-0.3 0.7 0.9" color="#777"></a-cylinder>
            <a-box width="0.4" height="0.4" depth="0.4" position="-0.3 1.5 0.9" color="#eee"></a-box>
            <a-cylinder radius="0.08" height="0.1" rotation="90 0 0" position="-0.3 1.5 1.1" color="#000"></a-cylinder>
            <a-cylinder radius="0.25" height="0.8" rotation="90 30 0" position="0 0.3 -1.4" color="#555"></a-cylinder>
            <a-cylinder radius="0.04" height="0.9" position="0.4 0.1 1.2" rotation="60 -20 0" color="#666"></a-cylinder>
            <a-box width="0.2" height="0.2" depth="0.3" position="0.6 -0.3 1.6" color="#333"></a-box>
            <a-cylinder radius="0.4" height="0.3" rotation="0 0 90" position="-1.0 -0.8 0.8" color="#333"></a-cylinder>

        <a-entity position="0 13 0" look-at="#mainCamera">

    </a-scene>
    <script>
        const LIMIT_RADIUS = 60; 
        const STATION_PRESETS = [
            {x: 0, z: -25}, {x: -35, z: -35}, {x: 35, z: -30}, {x: -45, z: 10},
            {x: 45, z: 20}, {x: -20, z: 40}, {x: 20, z: 45}, {x: 0, z: 50}
        ];

        const CURIOSITY_POS = { x: -15, z: -10 };
        const PERSEVERANCE_POS = { x: 25, z: 5 };
        const ROCKET_POS = { x: -10, z: 8 };
        let activeStations = [];

        const mainCamera = document.getElementById('mainCamera');
        const compass = document.getElementById('compass');
        const coordDisplay = document.getElementById('coord-display');
        const minimapRotator = document.getElementById('minimap-rotator');
        
        const curMarker = document.getElementById('curiosity-dot');
        const perMarker = document.getElementById('perseverance-dot');
        const rocketMarker = document.getElementById('rocket-dot');

        let keypadActive = false;
        const keypadState = { up: false, down: false, left: false, right: false };

        window.addEventListener('DOMContentLoaded', () => {
            buildCosmicStars();
            setTimeout(() => { endIntro(); }, 7800); 
        });

        function buildCosmicStars() {
            const starsVisual = document.getElementById('starsVisual');
            if (starsVisual && starsVisual.children.length === 0) {
                for (let i = 0; i < 200; i++) {
                    const star = document.createElement('a-sphere');
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.acos((Math.random() * 2) - 1); 
                    const radius = 350;
                    const x = radius * Math.sin(phi) * Math.cos(theta);
                    const y = radius * Math.cos(phi);
                    const z = radius * Math.sin(phi) * Math.sin(theta);
                    star.setAttribute('position', `${x} ${y} ${z}`);
                    star.setAttribute('radius', Math.random() * 0.6 + 0.2);
                    star.setAttribute('color', '#ffffff');
                    star.setAttribute('material', 'shader: flat; fog: false;');
                    starsVisual.appendChild(star);
                }
            }
        }

        function endIntro() {
            const intro = document.getElementById('intro-screen');
            if(intro) {
                intro.style.opacity = '0';
                setTimeout(() => intro.remove(), 1200);
            }
        }

        function toggleKeypad() {
            const btn = document.getElementById('keypadToggleBtn');
            const container = document.getElementById('keypad-container');
            keypadActive = !keypadActive;
            
            if (keypadActive) {
                btn.innerText = "🎮 키패드 끄기";
                container.style.display = 'grid';
            } else {
                btn.innerText = "🎮 키패드 켜기";
                container.style.display = 'none';
                keypadState.up = false; keypadState.down = false; keypadState.left = false; keypadState.right = false;
            }
        }

        function handleFileCount(input) {
            const files = input.files;
            if(files.length > 8) {
                alert("사진은 최대 8장까지만 선택 가능합니다. 자동으로 앞의 8장만 선택됩니다.");
            }
            document.getElementById('file-count').innerText = `선택된 사진: ${Math.min(files.length, 8)}장`;
        }

        function startMission() {
            const input = document.getElementById('imageInput');
            const files = Array.from(input.files).slice(0, 8);
            
            if (files.length === 0) return alert("최소 1장 이상의 사진을 업로드해주세요.");

            let loadedCount = 0;
            const dynamicStations = document.getElementById('dynamic-stations');
            const markersLayer = document.getElementById('station-markers-layer');

            files.forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const coords = STATION_PRESETS[index];
                    const entity = document.createElement('a-entity');
                    entity.setAttribute('position', `${coords.x} 0 ${coords.z}`);
                    
                    entity.innerHTML = `
                        <a-image src="${e.target.result}" scale="8 8 8" position="0 4 0"></a-image>
                        <a-cylinder color="silver" radius="0.08" height="8" position="0 4 0"></a-cylinder>
                        <a-entity position="0 8.5 0" look-at="#mainCamera">
                            <a-text value="STATION ${index + 1}" align="center" color="#ff7f50" width="5" font="kalsand"></a-text>
                        </a-entity>
                    `;
                    dynamicStations.appendChild(entity);

                    const dot = document.createElement('div');
                    dot.className = 'map-marker station-dot';
                    const label = document.createElement('span');
                    label.className = 'station-label';
                    label.innerText = `S${index+1}`;
                    dot.appendChild(label);
                    markersLayer.appendChild(dot);

                    activeStations.push({ element: dot, x: coords.x, z: coords.z });
                    loadedCount++;
                    if(loadedCount === files.length) launchScene();
                };
                reader.readAsDataURL(file);
            });
        }

        function launchScene() {
            document.getElementById('ui-layer').style.display = 'none';
            document.getElementById('dashboard-bg').style.display = 'none';
            document.getElementById('scene').style.display = 'block';
            document.getElementById('vr-controls').style.display = 'flex';
            document.getElementById('nav-system').style.display = 'block';
            animate();
        }

        function toggleFullscreen() {
            const btn = document.getElementById('fullscreenBtn');
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().then(() => { btn.innerText = "❌ 전체화면 종료"; });
            } else {
                document.exitFullscreen().then(() => { btn.innerText = "🖥️ 전체화면"; });
            }
        }

        function updateMarkerPosition(markerElement, targetX, targetZ, playerX, playerZ, theta) {
            const dx = targetX - playerX;
            const dz = targetZ - playerZ;
            const localX = dx * Math.cos(theta) - dz * Math.sin(theta);
            const localZ = dx * Math.sin(theta) + dz * Math.cos(theta);
            const mapX = 50 + (localX / LIMIT_RADIUS) * 50;
            const mapZ = 50 + (localZ / LIMIT_RADIUS) * 50;
            markerElement.style.left = `${mapX}%`;
            markerElement.style.top = `${mapZ}%`;
        }

        function animate() {
            requestAnimationFrame(animate);

            const pos = mainCamera.object3D.position;
            const theta = mainCamera.object3D.rotation.y;

            if (keypadActive) {
                const moveSpeed = 0.12;
                if (keypadState.up) { pos.x -= moveSpeed * Math.sin(theta); pos.z -= moveSpeed * Math.cos(theta); }
                if (keypadState.down) { pos.x += moveSpeed * Math.sin(theta); pos.z += moveSpeed * Math.cos(theta); }
                if (keypadState.left) { pos.x -= moveSpeed * Math.cos(theta); pos.z += moveSpeed * Math.sin(theta); }
                if (keypadState.right) { pos.x += moveSpeed * Math.cos(theta); pos.z -= moveSpeed * Math.cos(theta); }
            }

            let deg = Math.round(theta * (180 / Math.PI)); 
            if (deg < 0) deg += 360;
            minimapRotator.style.transform = `rotate(${deg}deg)`;

            updateMarkerPosition(curMarker, CURIOSITY_POS.x, CURIOSITY_POS.z, pos.x, pos.z, theta);
            updateMarkerPosition(perMarker, PERSEVERANCE_POS.x, PERSEVERANCE_POS.z, pos.x, pos.z, theta);
            if (rocketMarker) {
    updateMarkerPosition(rocketMarker, ROCKET_POS.x, ROCKET_POS.z, pos.x, pos.z, theta);
}
            activeStations.forEach(station => { updateMarkerPosition(station.element, station.x, station.z, pos.x, pos.z, theta); });
            
            let dir = "N";
            if (deg > 45 && deg <= 135) dir = "W";
            else if (deg > 135 && deg <= 225) dir = "S";
            else if (deg > 225 && deg <= 315) dir = "E";
            compass.innerText = `${dir} ${deg % 360}°`;

            coordDisplay.innerText = `X:${Math.round(pos.x)} Z:${Math.round(pos.z)}`;

            const dist = Math.sqrt(pos.x**2 + pos.z**2);
            if (dist > LIMIT_RADIUS) {
                const angle = Math.atan2(pos.z, pos.x);
                pos.x = Math.cos(angle) * LIMIT_RADIUS;
                pos.z = Math.sin(angle) * LIMIT_RADIUS;
            }
        }

        function setEnv(mode) {
    const sky = document.getElementById('sky');
    const sceneEl = document.getElementById('scene');
    const sunVisual = document.getElementById('sunVisual');
    const starsVisual = document.getElementById('starsVisual'); // 별 그룹 요소

    if (mode === 'day') {
        sky.setAttribute('color', '#87CEEB'); // 낮 하늘색으로 변경 (기존 #070512)
        sceneEl.setAttribute('fog', 'color: #d3a085; density: 0.005');
        if (sunVisual) sunVisual.setAttribute('visible', 'true');
        
        // [수정 포인트] 낮에는 별을 보이지 않게 처리
        if (starsVisual) starsVisual.setAttribute('visible', 'false'); 
        
    } else if (mode === 'night') {
        sky.setAttribute('color', '#010105'); 
        sceneEl.setAttribute('fog', 'color: #0d0a1a; density: 0.003'); 
        if (sunVisual) sunVisual.setAttribute('visible', 'false');
        
        // [수정 포인트] 밤에는 별이 보이게 처리
        if (starsVisual) starsVisual.setAttribute('visible', 'true');
        document.getElementById('amb').setAttribute('intensity', '0.2'); 
        
    } else if (mode === 'storm') {
        sky.setAttribute('color', '#140b05');
        sceneEl.setAttribute('fog', 'color: #6e391a; density: 0.08');
        if (sunVisual) sunVisual.setAttribute('visible', 'false');
        
        // [수정 포인트] 모래폭풍 시에도 별은 숨김
        if (starsVisual) starsVisual.setAttribute('visible', 'false'); 
    }
}
    </script>
